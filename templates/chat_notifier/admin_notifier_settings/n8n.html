<div class="form-group">
	<label>
		Webhook URL<br>
		<small class="form-text text-muted">
			Webhook URL to send the messages to
		</small>
	</label>
	<input class="form-control" id="notifier_n8n_webhook_url" name="notifier_n8n_webhook_url" type="text"
		placeholder="https://n8n.com/webhook/{webhook.id}"
		{% if notifier_n8n_webhook_url is defined and notifier_n8n_webhook_url != None %}value="{{ notifier_n8n_webhook_url }}"{% endif %}>
</div>
